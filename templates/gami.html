<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GAMI Spread Analysis</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
</head>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
    <div class="container-fluid">
        <a class="navbar-brand" href="/analyzer">← Back to Flight Data Analyzer</a>
        <span class="navbar-text text-white">✈️ Gami Spread Analysis</span>
    </div>
</nav>

<body class="bg-light" style="padding-top: 70px;">

<div class="container-fluid p-4">

    <!-- HEADER -->
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h3 class="text-secondary">GAMI Spread Analysis</h3>
    </div>

    <!-- FLIGHT SELECT -->
    <div class="card p-3 mb-3">
        <div class="row g-2 align-items-end">

            <div class="col-md-6">
                <label class="form-label">Select Flight</label>
                <select id="savedFlights" class="form-select" onchange="loadFlight()"></select>
            </div>


        </div>
    </div>

    <!-- Temp Unit Toggle -->
    <div class="btn-group" role="group">
        <input type="radio" class="btn-check" name="tempUnit" id="unitF" autocomplete="off" value="F" checked>
        <label class="btn btn-outline-primary btn-sm" for="unitF">°F</label>

        <input type="radio" class="btn-check" name="tempUnit" id="unitC" autocomplete="off" value="C">
        <label class="btn btn-outline-primary btn-sm" for="unitC">°C</label>
    </div>
    <!-- METRICS -->
    <div class="card p-3 mb-3">
        <div id="metrics" class="text-muted">No data loaded.</div>
    </div>

    <!-- CHARTS -->
    <div class="row g-3">

        <div class="col-md-6">
            <div class="card p-3">
                <div id="timeGraph" style="height:350px;"></div>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card p-3">
                <div id="scatterGraph" style="height:350px;"></div>
            </div>
        </div>


    </div>
</div>

<script>
let currentData = null;
let tempUnit = 'F';
let timeWindow = null; // {start, end} based on selection

let timeSelectionState = {
    start: null,
    end: null
};
let clickMarkers = [];
let hoverX = null;

function setTempUnit(u) {
    tempUnit = u;
    if (currentData) {
        renderGami(currentData);
    }
}

document.addEventListener("DOMContentLoaded", () => {
    fetch('/api/list_files')
        .then(r => r.json())
        .then(data => {
            const sel = document.getElementById('savedFlights');

            // Support multiple possible API response shapes
            const files = Array.isArray(data)
                ? data
                : (data.files || data.file_list || []);

            files
                .filter(Boolean)
                .sort((a, b) => b.localeCompare(a))
                .forEach(f => {
                    sel.add(new Option(f, f));
                });

            // AUTO-SELECT FIRST FLIGHT AND LOAD IT
            if (sel.options.length > 0) {
                sel.selectedIndex = 0;
                loadFlight();
            }
        })
        .catch(err => {
            console.error("Failed to load flights:", err);
        });
});

function loadFlight() {
    const file = document.getElementById('savedFlights').value;
    if (!file) return;

    const formData = new FormData();
    formData.append('saved_filename', file);
    formData.append('filters', JSON.stringify([]));

    fetch('/api/analyze_flight', { method: 'POST', body: formData })
        .then(r => r.json())
        .then(renderGami);
}

function renderGami(data) {
    if (data.error) {
        alert(data.error);
        return;
    }

    currentData = data;

    // =====================================================
    // USE RAW DATAFRAME (NOT PLOTTED TRACES)
    // =====================================================
    const df =
        data.rawData ||
        data.raw_data ||
        data.dataframe ||
        data.df;

    // fallback time handling
    const time =
        (df && df.length && (df[0].time !== undefined))
            ? df.map(r => r.time)
            : data.plot_data.x;

    // guard
    if (!df || !df.length) {
        document.getElementById("metrics").innerText = "No raw dataframe found in response.";
        return;
    }

    // detect column names
    const keys = Object.keys(df[0]);

    const egtKeys = keys.filter(k => {
        const ku = k.toUpperCase();
        if (!ku.includes("EGT")) return false;

        if (tempUnit === 'F') return ku.includes("(DEG F)");
        if (tempUnit === 'C') return ku.includes("(DEG C)");

        return true;
    });

    // Prefer Fuel Flow explicitly (avoid Fuel Pressure confusion)
    const fuelKey = keys.find(k => {
        const kl = k.toLowerCase();
        return kl.includes("fuel flow");
    });

    // build EGT series from dataframe
    const egtTraces = egtKeys.map(k => ({
        name: k,
        y: df.map(r => r[k])
    }));

    const fuelTrace = fuelKey ? {
        name: fuelKey,
        y: df.map(r => r[fuelKey])
    } : null;

    if (!egtTraces.length) {
        document.getElementById("metrics").innerText =
            `No EGT data found for ${tempUnit} units.`;
        return;
    }

    // METRICS
    const avgs = egtTraces.map(t => {
        const avg = t.y.reduce((a,b)=>a+b,0)/t.y.length;
        return { name: t.name, avg };
    });

    const values = avgs.map(a => a.avg);
    const spread = Math.max(...values) - Math.min(...values);

    // ---- GAMI Spread Calculation ----
    let gamiSpreadText = "N/A";

    // compute GAMI spread ONLY when time window exists
    if (timeWindow && timeWindow.start != null && timeWindow.end != null && fuelTrace) {

        const mask2 = time.map(t =>
            t >= timeWindow.start && t <= timeWindow.end
        );

        const peakFuelFlows = [];

        egtTraces.forEach((t) => {
            let maxY = null;
            let maxIdx = null;

            for (let j = 0; j < t.y.length; j++) {
                if (!mask2[j]) continue;

                if (maxY === null || t.y[j] > maxY) {
                    maxY = t.y[j];
                    maxIdx = j;
                }
            }

            if (maxIdx !== null) {
                peakFuelFlows.push(fuelTrace.y[maxIdx]);
            }
        });

        if (peakFuelFlows.length) {
            const maxFF = Math.max(...peakFuelFlows);
            const minFF = Math.min(...peakFuelFlows);
            const gamiSpread = maxFF - minFF;

            gamiSpreadText = gamiSpread.toFixed(2);
        }
    }

    document.getElementById("metrics").innerHTML = `
        <b>EGT Spread:</b> ${spread.toFixed(1)} °F<br>
        <b>GAMI Spread (ΔFF):</b> ${gamiSpreadText}
    `;

    // TIME SERIES
    const timeTraces = egtTraces.map(t => ({
        x: time,
        y: t.y,
        mode: 'lines',
        name: t.name
    }));

    if (fuelTrace) {
        timeTraces.push({
            x: time,
            y: fuelTrace.y,
            mode: 'lines',
            name: fuelTrace.name,
            yaxis: 'y2'
        });
    }

    Plotly.newPlot('timeGraph', timeTraces, {
        title: "EGT + Fuel Flow vs Time",
        xaxis: { title: "Time" },
        yaxis: { title: "EGT" },
        yaxis2: {
            title: "Fuel Flow",
            overlaying: 'y',
            side: 'right'
        },
        hovermode: 'x',
        shapes: [],
        margin: { t: 40 }
    });

    // Click-based time window selection
    const timeGraphDiv = document.getElementById('timeGraph');
    timeGraphDiv.on('plotly_click', function(eventdata) {
        if (!eventdata.points || eventdata.points.length === 0) return;

        const x = eventdata.points[0].x;

        // add black click marker
        clickMarkers.push(x);

        // CASE 3: reset if both already set
        if (timeSelectionState.start !== null && timeSelectionState.end !== null) {
            timeSelectionState.start = x;
            timeSelectionState.end = null;
            timeWindow = null;

            // reset click markers on new selection
            clickMarkers = [x];

            drawSelectionBox();
            renderGami(currentData);
            return;
        }

        // CASE 1: first click (start)
        if (timeSelectionState.start === null) {
            timeSelectionState.start = x;
            timeSelectionState.end = null;
            timeWindow = null;

            // first click marker
            clickMarkers = [x];
        }
        // CASE 2: second click (end)
        else {
            timeSelectionState.end = x;

            // ensure ordering
            if (timeSelectionState.end < timeSelectionState.start) {
                const tmp = timeSelectionState.start;
                timeSelectionState.start = timeSelectionState.end;
                timeSelectionState.end = tmp;
            }

            timeWindow = {
                start: timeSelectionState.start,
                end: timeSelectionState.end
            };
        }

        drawSelectionBox();
        renderGami(currentData);
    });

    function updateVerticalCursor(x) {
        Plotly.relayout('timeGraph', {
            shapes: [
                {
                    type: 'line',
                    x0: x,
                    x1: x,
                    y0: 0,
                    y1: 1,
                    yref: 'paper',
                    line: {
                        color: 'rgba(0,0,0,0.4)',
                        width: 1,
                        dash: 'dot'
                    }
                }
            ]
        });
    }

    function drawSelectionBox() {
        const shapes = [];

        // CLICK MARKERS (BLACK VERTICAL LINES)
        clickMarkers.forEach(x => {
            shapes.push({
                type: 'line',
                x0: x,
                x1: x,
                y0: 0,
                y1: 1,
                yref: 'paper',
                line: {
                    color: 'black',
                    width: 2
                }
            });
        });

        // START LINE (green)
        if (timeSelectionState.start !== null) {
            shapes.push({
                type: 'line',
                x0: timeSelectionState.start,
                x1: timeSelectionState.start,
                y0: 0,
                y1: 1,
                yref: 'paper',
                line: {
                    color: 'green',
                    width: 2
                }
            });
        }

        // END LINE (red)
        if (timeSelectionState.end !== null) {
            shapes.push({
                type: 'line',
                x0: timeSelectionState.end,
                x1: timeSelectionState.end,
                y0: 0,
                y1: 1,
                yref: 'paper',
                line: {
                    color: 'red',
                    width: 2
                }
            });
        }

        Plotly.relayout('timeGraph', { shapes });
    }
    function drawCursor(plotId, x) {
        const shapes = [];

        // CLICK MARKERS (black persistent clicks)
        clickMarkers.forEach(v => {
            shapes.push({
                type: 'line',
                x0: v,
                x1: v,
                y0: 0,
                y1: 1,
                yref: 'paper',
                line: {
                    color: 'black',
                    width: 2
                }
            });
        });

        // SELECTION START (green)
        if (timeSelectionState.start !== null) {
            shapes.push({
                type: 'line',
                x0: timeSelectionState.start,
                x1: timeSelectionState.start,
                y0: 0,
                y1: 1,
                yref: 'paper',
                line: {
                    color: 'green',
                    width: 2
                }
            });
        }

        // SELECTION END (red)
        if (timeSelectionState.end !== null) {
            shapes.push({
                type: 'line',
                x0: timeSelectionState.end,
                x1: timeSelectionState.end,
                y0: 0,
                y1: 1,
                yref: 'paper',
                line: {
                    color: 'red',
                    width: 2
                }
            });
        }

        // CURSOR LINE (hover)
        if (x !== null && x !== undefined) {
            shapes.push({
                type: 'line',
                x0: x,
                x1: x,
                y0: 0,
                y1: 1,
                yref: 'paper',
                line: {
                    color: 'rgba(0,0,0,0.35)',
                    width: 1,
                    dash: 'dot'
                }
            });
        }

        Plotly.relayout(plotId, { shapes });
    }

    function syncCursor(x) {
        hoverX = x;
        drawCursor('timeGraph', x);
        drawCursor('scatterGraph', x);
    }

    // mouse hover cursor
    timeGraphDiv.on('plotly_hover', function(eventdata) {
        if (eventdata && eventdata.points && eventdata.points.length > 0) {
            syncCursor(eventdata.points[0].x);
        }
    });

    // remove cursor when leaving plot
    timeGraphDiv.on('plotly_unhover', function() {
        // restore persistent selection + click markers without cursor
        drawSelectionBox();
    });



    // SCATTER (APPLY TIME WINDOW FILTER IF SET)
    if (fuelTrace) {
        const colors = ['#0d6efd','#198754','#dc3545','#fd7e14'];

        const mask = time.map(t => {
            if (!timeWindow) return true;
            return t >= timeWindow.start && t <= timeWindow.end;
        });

        const scatter = egtTraces.map((t,i)=>({
            x: fuelTrace.y.filter((_, idx) => mask[idx]),
            y: t.y.filter((_, idx) => mask[idx]),
            mode: 'lines+markers',
            type: 'scatter',
            name: t.name,
            line: {
                shape: 'spline',
                width: 2,
                color: colors[i % colors.length]
            },
            marker: {
                size: 3,
                color: colors[i % colors.length]
            }
        }));

        // =====================================================
        // PEAK ANNOTATIONS (ONLY AFTER 2-CLICK WINDOW SELECTION)
        // =====================================================
        let annotations = [];

        if (timeWindow && timeWindow.start != null && timeWindow.end != null) {

            const mask2 = time.map(t =>
                t >= timeWindow.start && t <= timeWindow.end
            );

            egtTraces.forEach((t, i) => {
                let maxY = null;
                let maxIdx = null;

                for (let j = 0; j < t.y.length; j++) {
                    if (!mask2[j]) continue;

                    if (maxY === null || t.y[j] > maxY) {
                        maxY = t.y[j];
                        maxIdx = j;
                    }
                }

                if (maxIdx !== null && fuelTrace) {
                    const fuelVal = fuelTrace.y[maxIdx];

                    annotations.push({
                        x: fuelVal,
                        y: maxY,
                        text: (fuelVal ? `${t.name}: ${fuelVal.toFixed(1)}` : t.name),
                        showarrow: true,
                        arrowhead: 2,
                        ax: 40,   // keep 45° offset via ax/ay
                        ay: -40,
                        textangle: 0,  // keep label horizontal
                        font: {
                            size: 10
                        }
                    });
                }
            });
        }

        // =====================================================
        // SCATTER PLOT (EGT vs FUEL FLOW - SMOOTHED)
        // =====================================================
        Plotly.newPlot('scatterGraph', scatter, {
            title: "EGT vs Fuel Flow",
            xaxis: { title: "Fuel Flow" },
            yaxis: { title: "EGT" },
            margin: { t: 40 },
            annotations: annotations
        });

        const scatterDiv = document.getElementById('scatterGraph');

        scatterDiv.on('plotly_hover', function(eventdata) {
            if (eventdata && eventdata.points && eventdata.points.length > 0) {
                syncCursor(eventdata.points[0].x);
            }
        });

        scatterDiv.on('plotly_unhover', function() {
            Plotly.relayout('scatterGraph', { shapes: [] });
        });
    }

}
</script>

</body>
</html>
