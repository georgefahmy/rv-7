<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flight Data Analyzer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <style>
        body { background-color: #f8f9fa; padding-top: 56px; }
        .navbar { position: fixed; top: 0; width: 100%; z-index: 1050; }
        .graph-container { background: white; padding: 10px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); min-height: 500px; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="/">← Back to Dashboard</a>
        <span class="navbar-text text-white">✈️ Flight Data Analyzer</span>
    </div>
</nav>

<div class="container-fluid mt-4 px-4">
    <div class="row">
        <!-- Control Panel -->
        <div class="col-md-3">
            <div class="card p-3 shadow-sm mb-4">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h5 class="mb-0">Flight Data Source</h5>

                    <!-- Temp Unit Toggle -->
                    <div class="btn-group" role="group">
                        <input type="radio" class="btn-check" name="tempUnit" id="unitF" autocomplete="off" value="F" checked>
                        <label class="btn btn-outline-primary btn-sm" for="unitF">°F</label>

                        <input type="radio" class="btn-check" name="tempUnit" id="unitC" autocomplete="off" value="C">
                        <label class="btn btn-outline-primary btn-sm" for="unitC">°C</label>
                    </div>
                </div>

                <form id="uploadForm">
                    <div class="mb-3">
                        <label class="form-label text-muted small mb-1">Previously Saved Flights</label>
                        <select class="form-select" id="savedFlights">
                            <option value="">-- Upload New File Below --</option>
                        </select>
                    </div>

                    <hr>

                    <div class="mb-3">
                        <label class="form-label text-muted small mb-1">Upload New File</label>
                        <input class="form-control" type="file" id="csvFile" accept=".csv">
                    </div>

                    <div class="mb-3 mt-4">
                        <label class="form-label">Left Axis Signal</label>
                        <select class="form-select" id="leftSignal" disabled>
                            <option value="">Select a file first...</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Right Axis Signal</label>
                        <select class="form-select" id="rightSignal" disabled>
                            <option value="">Select a file first...</option>
                        </select>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 d-none" id="analyzeBtn" disabled>Analyze Flight</button>
                </form>
            </div>

            <!-- Summary Stats Box -->
            <div class="card p-3 shadow-sm d-none" id="statsCard">
                <h5>Flight Summary</h5>
                <hr class="mt-1 mb-2">
                <ul class="list-unstyled mb-0" id="statsList">
                    <!-- Populated by JS -->
                </ul>
            </div>
        </div>

        <!-- Graph Display -->
        <div class="col-md-9">
            <div class="graph-container d-flex flex-column align-items-center justify-content-center h-100">
                <div id="loader" class="d-none">
                    <div class="spinner-border text-primary" role="status" style="width: 3rem; height: 3rem;"></div>
                    <p class="mt-2 text-muted">Processing data...</p>
                </div>

                <p id="placeholderText" class="text-muted mb-0">Select or upload a flight to view the interactive graph.</p>

                <div id="flightGraph" class="w-100 h-100 d-none"></div>
            </div>
        </div>
    </div>
</div>

<script>
// Global state
let currentSavedFilename = "";
let masterSignalsList = [];

// 1. Fetch saved flights on page load
document.addEventListener('DOMContentLoaded', function() {
    fetch('/api/saved_flights')
        .then(res => res.json())
        .then(data => {
            const select = document.getElementById('savedFlights');
            data.files.forEach(f => {
                select.options.add(new Option(f, f));
            });
        });
});

// 2. Centralized function to request signals
function loadSignals(formData) {
    const leftSelect = document.getElementById('leftSignal');
    const rightSelect = document.getElementById('rightSignal');

    leftSelect.innerHTML = '<option>Loading signals...</option>';
    rightSelect.innerHTML = '<option>Loading signals...</option>';
    leftSelect.disabled = true;
    rightSelect.disabled = true;

    fetch('/api/get_signals', {
        method: 'POST',
        body: formData
    })
    .then(response => response.json())
    .then(data => {
        if (data.error) {
            alert("Error: " + data.error);
            leftSelect.innerHTML = '<option>Error loading data</option>';
            rightSelect.innerHTML = '<option>Error loading data</option>';
            return;
        }

        currentSavedFilename = data.saved_filename;
        masterSignalsList = data.signals;

        populateDropdowns();

        leftSelect.disabled = false;
        rightSelect.disabled = false;

        triggerAnalysis();
    })
    .catch(err => {
        console.error(err);
        alert("Failed to read file signals.");
    });
}

function populateDropdowns() {
    if (masterSignalsList.length === 0) return;

    const unitF = document.getElementById('unitF').checked;
    const hideString = unitF ? "(deg C)" : "(deg F)";

    const leftSelect = document.getElementById('leftSignal');
    const rightSelect = document.getElementById('rightSignal');

    const currentLeft = leftSelect.value;
    const currentRight = rightSelect.value;

    let optionsHtml = '';

    // Filter out the opposite temperature unit (but always keep the virtual "CHT" and "EGT" items)
    const filteredSignals = masterSignalsList.filter(sig => {
        if (sig === "CHT" || sig === "EGT") return true;
        return !sig.includes(hideString);
    });

    filteredSignals.forEach(sig => {
        optionsHtml += `<option value="${sig}">${sig}</option>`;
    });

    leftSelect.innerHTML = optionsHtml;
    rightSelect.innerHTML = optionsHtml;

    if (filteredSignals.includes(currentLeft)) {
        leftSelect.value = currentLeft;
    } else if (filteredSignals.includes("RPM")) {
        leftSelect.value = "RPM";
    }

    if (filteredSignals.includes(currentRight)) {
        rightSelect.value = currentRight;
    } else if (filteredSignals.includes("AVG_CHT")) {
        rightSelect.value = "AVG_CHT";
    }
}

// 3. Handle File Upload
document.getElementById('csvFile').addEventListener('change', function(e) {
    if (e.target.files.length === 0) return;
    document.getElementById('savedFlights').value = "";
    const formData = new FormData();
    formData.append('file', e.target.files[0]);
    loadSignals(formData);
});

// 4. Handle Saved Flight Selection
document.getElementById('savedFlights').addEventListener('change', function(e) {
    if (!e.target.value) return;
    document.getElementById('csvFile').value = "";
    const formData = new FormData();
    formData.append('saved_filename', e.target.value);
    loadSignals(formData);
});

// Handle Unit Toggle Change
document.querySelectorAll('input[name="tempUnit"]').forEach(radio => {
    radio.addEventListener('change', function() {
        populateDropdowns();
        triggerAnalysis();
    });
});

// 5. The core analysis function that handles fetching and plotting
function triggerAnalysis() {
    if (!currentSavedFilename) return;

    const leftSignal = document.getElementById('leftSignal').value;
    const rightSignal = document.getElementById('rightSignal').value;
    const tempUnit = document.getElementById('unitF').checked ? 'F' : 'C';

    document.getElementById('placeholderText').classList.add('d-none');
    document.getElementById('flightGraph').classList.add('d-none');
    document.getElementById('loader').classList.remove('d-none');
    document.getElementById('statsCard').classList.add('d-none');

    const formData = new FormData();
    formData.append('saved_filename', currentSavedFilename);
    formData.append('left_signal', leftSignal);
    formData.append('right_signal', rightSignal);
    formData.append('temp_unit', tempUnit);

    fetch('/api/analyze_flight', {
        method: 'POST',
        body: formData
    })
    .then(response => response.json())
    .then(data => {
        document.getElementById('loader').classList.add('d-none');

        if (data.error) {
            alert("Error: " + data.error);
            document.getElementById('placeholderText').classList.remove('d-none');
            return;
        }

        // --- Build Plotly Chart ---
        const graphDiv = document.getElementById('flightGraph');
        graphDiv.classList.remove('d-none');

        const traces = [];

        // Colors: Blues/Greens for the Left Axis, Reds/Oranges/Pinks for the Right Axis
        const colorsLeft = ['#0d6efd', '#0dcaf0', '#198754', '#20c997'];
        const colorsRight = ['#dc3545', '#fd7e14', '#ffc107', '#d63384'];

        // Generate traces dynamically (handles 1 trace, or 4 traces if CHT/EGT is picked)
        data.plot_data.left_traces.forEach((traceData, idx) => {
            traces.push({
                x: data.plot_data.x,
                y: traceData.y,
                name: traceData.name,
                type: 'scatter',
                mode: 'lines',
                line: { color: colorsLeft[idx % colorsLeft.length] }
            });
        });

        data.plot_data.right_traces.forEach((traceData, idx) => {
            traces.push({
                x: data.plot_data.x,
                y: traceData.y,
                name: traceData.name,
                type: 'scatter',
                mode: 'lines',
                line: { color: colorsRight[idx % colorsRight.length] },
                yaxis: 'y2'
            });
        });

        const layout = {
            title: `Flight Analysis: ${data.stats.flight_id}`,
            xaxis: { title: 'Session Time (seconds)' },
            yaxis: {
                title: data.plot_data.left_name,
                titlefont: { color: '#0d6efd' },
                tickfont: { color: '#0d6efd' }
            },
            yaxis2: {
                title: data.plot_data.right_name,
                titlefont: { color: '#dc3545' },
                tickfont: { color: '#dc3545' },
                overlaying: 'y',
                side: 'right'
            },
            hovermode: 'x unified',
            margin: { l: 60, r: 60, t: 60, b: 40 },
            legend: { orientation: "h", y: -0.2 }
        };

        Plotly.newPlot(graphDiv, traces, layout, {responsive: true});

        const statsList = document.getElementById('statsList');
        statsList.innerHTML = `
            <li><strong>Flight ID:</strong> ${data.stats.flight_id}</li>
            <li><strong>Duration:</strong> ${data.stats.duration_min} min</li>
            <li><strong>Max RPM:</strong> ${data.stats.max_rpm}</li>
            <li><strong>Max CHT:</strong> ${data.stats.max_cht} °F</li>
            <li><strong>Total Fuel:</strong> ${data.stats.total_fuel} gal</li>
            <li><strong>Avg Flow:</strong> ${data.stats.avg_fuel_flow} gal/hr</li>
        `;
        document.getElementById('statsCard').classList.remove('d-none');
    })
    .catch(err => {
        alert("A network error occurred.");
        console.error(err);
        document.getElementById('loader').classList.add('d-none');
        document.getElementById('placeholderText').classList.remove('d-none');
    });
}

document.getElementById('leftSignal').addEventListener('change', triggerAnalysis);
document.getElementById('rightSignal').addEventListener('change', triggerAnalysis);
document.getElementById('uploadForm').addEventListener('submit', function(e) { e.preventDefault(); });
</script>
</body>
</html>
